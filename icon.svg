<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D8060"/>
      <stop offset="100%" stop-color="#2A5C45"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C07A"/>
      <stop offset="100%" stop-color="#C8943A"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <!-- Subtle soil/ground arc -->
  <ellipse cx="90" cy="165" rx="70" ry="18" fill="#24503A" opacity="0.5"/>
  <!-- Main stem -->
