  <path d="M90 90 C102 76, 118 62, 130 45" stroke="#C3DDD0" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Small top leaf bud -->
  <path d="M90 72 C82 65, 78 52, 82 44 C84 44, 88 50, 90 62" fill="#7BAE8E"/>
  <path d="M90 72 C98 65, 102 52, 98 44 C96 44, 92 50, 90 62" fill="#A8D5A2"/>
