  <g stroke="#E8C07A" stroke-width="2.5" stroke-linecap="round" opacity="0.8">
    <line x1="140" y1="18" x2="140" y2="13"/>
    <line x1="140" y1="58" x2="140" y2="63"/>
    <line x1="120" y1="38" x2="115" y2="38"/>
    <line x1="160" y1="38" x2="165" y2="38"/>
    <line x1="125.9" y1="23.9" x2="122.4" y2="20.4"/>
    <line x1="154.1" y1="52.1" x2="157.6" y2="55.6"/>
    <line x1="154.1" y1="23.9" x2="157.6" y2="20.4"/>
    <line x1="125.9" y1="52.1" x2="122.4" y2="55.6"/>
  </g>
</svg>
